patch:
  schema_list:
    - schema: wubi86_jidian                             # 五笔86-极点86
    # - schema: rime_mint                               # 薄荷拼音
    # - schema: rime_mint_flypy                         # 薄荷拼音-小鹤混输方案
    # - schema: double_pinyin_flypy                     # 小鹤双拼
    # - schema: terra_pinyin                            # 地球拼音-薄荷定制
    # - schema: t9                                      # 仓九宫格-全拼输入
    # - schema: wubi98_mint                             # 五笔98-五笔小筑
  ascii_composer/good_old_caps_lock: false              # 启用经典的 Caps Lock 开启西文模式的方式
  ascii_composer/switch_key:                            # 定义切换到西文模式的快捷键
    Caps_Lock: noop                                     # 按下 Caps Lock 会直接上屏
    Control_L: noop                                     # 按下左 Control 键不做任何操作
    Control_R: noop                                     # 按下右 Control 键不做任何操作
    Shift_L: noop                                       # 按下左 Shift 键会直接上屏
    Shift_R: commit_code                                # 按下右 Shift 键会临时切换到西文模式
  key_binder/bindings:
    - { when: has_menu, accept: semicolon, send: 2 }    # 候选2 用分号
    - { when: has_menu, accept: apostrophe, send: 3 }   # 候选3 用单引号
