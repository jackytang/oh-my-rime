patch:
  style/color_scheme: "dracula_light"                   # 默认配色方案
  style/color_scheme_dark: "dracula_dark"               # 深色配置方案
  style/horizontal: true                                # 候选项水平排列（在custom内和candidate_list_layout的linear效果一样）
  style/inline_preedit: true                            # 行内显示预编辑区：true；false
  preset_color_schemes:
    dracula_dark:
      name: dracula
      corner_radius: 5                                  # 候选条圆角
      line_spacing: 10                                  # 行高
      inline_preedit: true                              # 单行显示，false双行显示
      back_color: 0x362A28                              # 候选条背景色
      color_space: display_p3                           # Only available on macOS 10.12+
      font_point: 16                                    # 候选字词大小
      text_color: 0x6CB8FF                              # 拼音行文字颜色，24位色值，16进制，BGR顺序
      text_orientation: horizontal                      # horizontal | vertical
      hilited_text_color: 0x5A4744                      # 高亮拼音 (需要开启内嵌编码)
      hilited_back_color: 0xF2F8F8                      # 高亮拼音 (需要开启内嵌编码)
      hilited_candidate_label_color: 0xFAFAFA           # 第一候选项编号颜色
      hilited_candidate_text_color: 0xF2F8F8            # 第一候选项文字颜色
      hilited_candidate_back_color: 0xC679FF            # 第一候选项背景背景色
      hilited_comment_text_color: 0x362b00              # 第一候选提示文字颜色
      hilited_corner_radius: 3                          # 高亮圆角
      comment_text_color: 0xFDE98B                      # 拼音等提示文字颜色
      candidate_text_color: 0xF993BD                    # 预选项文字颜色
      candidate_format: "%c.\u2005%@\u2005"             # 用 1/6 em 空格 U+2005 来控制编号 %c 和候选词 %@ 前后的空间的。
      candidate_list_layout: linear                     # 水平排列 linear | stacked
      label_font_point: 14                              # 候选编号大小
      border_color: 0x362A28                            # 窗口边框颜色
      border_height: 4                                  # 窗口边界高度，大于圆角半径才生效
      border_width: 4                                   # 窗口边界宽度，大于圆角半径才生效
      border_color_width: 0                             # 窗口边框颜色宽度
    dracula_light:
      name: dracula_light
      corner_radius: 5                                  # 候选条圆角
      line_spacing: 10                                  # 垂直显示行高
      inline_preedit: true                              # 单行显示，false双行显示
      color_space: display_p3                           # Only available on macOS 10.12+
      back_color: 0xF2F8F8                              # 候选条背景色
      text_color: 0x362A28                              # 拼音行文字颜色，24位色值，16进制，BGR顺序
      text_orientation: horizontal                      # horizontal | vertical
      font_point: 16                                    # 候选字词大小
      hilited_text_color: 0x362A28                      # 高亮拼音 (需要开启内嵌编码)
      hilited_back_color: 0xF2F8F8                      # 高亮拼音 (需要开启内嵌编码)
      hilited_candidate_label_color: 0xF2F8F8           # 第一候选项编号颜色
      hilited_candidate_text_color:  0xF2F8F8           # 第一候选项文字颜色
      hilited_candidate_back_color: 0xC679FF            # 第一候选项背景背景色
      hilited_comment_text_color: 0x362b00              # 第一候选提示文字颜色
      hilited_corner_radius: 3                          # 高亮圆角
      comment_text_color: 0x5A4744                      # 拼音等提示文字颜色
      candidate_text_color: 0x362A28                    # 预选项文字颜色
      candidate_format: "%c.\u2005%@\u2005"             # 用 1/6 em 空格 U+2005 来控制编号 %c 和候选词 %@ 前后的空间的。
      candidate_list_layout: linear                     # 水平排列 linear | stacked
      label_font_point: 14                              # 候选编号大小
      border_color: 0xF2F8F8                            # 窗口边框颜色
      border_height: 4                                  # 窗口边界高度，大于圆角半径才生效
      border_width: 4                                   # 窗口边界宽度，大于圆角半径才生效
      border_color_width: 0                             # 窗口边框颜色宽度
    system_blue:
      name: "系统蓝／System Blue"
      author: "scomper <scomper@gmail.com>"             # 作者信息
      corner_radius: 5                                  # 候选条圆角
      inline_preedit: true                              # 单行显示，false双行显示
      text_orientation: horizontal                      # horizontal | vertical
      back_color: 0xFFFFFF                              # 候选条背景色，24位色值，16进制，BGR顺序
      text_color: 0x424242                              # 拼音行文字颜色
      color_space: display_p3                           # Only available on macOS 10.12+
      comment_text_color: 0x999999                      # 拼音等提示文字颜色
      font_point: 16                                    # 候选文字大小
      font_face: "PingFangSC"                           # 候选词编号字体
      hilited_text_color: 0x999999                      # 高亮拼音 (需要开启内嵌编码)
      hilited_back_color: 0xF8AA4D                      # 第一候选项背景背景色
      hilited_candidate_text_color: 0xFFFFFF            # 第一候选项文字颜色
      hilited_candidate_label_color: 0xFFFFFF           # 第一候选项编号颜色
      hilited_comment_text_color: 0x999999              # 注解文字高亮
      hilited_corner_radius: 3                          # 高亮圆角
      candidate_text_color: 0x000000                    # 预选项文字颜色
      candidate_list_layout: linear                     # 水平排列 linear | stacked
      candidate_format: "%c.\u2005%@\u2005"             # 用 1/6 em 空格 U+2005 来控制编号 %c 和候选词 %@ 前后的空间的。
      label_color: 0x999999                             # 预选栏编号颜色
      label_font_point: 14                              # 候选编号大小
      label_font_face: "SFCompactText-Regular"          # 候选词编号字体
      border_color: 0xFFFFFF                            # 边框色
      border_height: 4                                  # 窗口边界高度，大于圆角半径才生效
      border_width: 4                                   # 窗口边界宽度，大于圆角半径才生效
      border_color_width: 0                             # 窗口边框颜色宽度
    mritd_dark:
      # https://mritd.me/2019/03/23/oh-my-rime/
      name: 漠然／mritd dark
      author: mritd <mritd1234@gmail.com>
      corner_radius: 5                                  # 候选条圆角
      inline_preedit: true                              # 单行显示，false双行显示
      text_orientation: horizontal                      # horizontal | vertical
      back_color: 0x252320                              # 候选条背景色
      text_color: 0xdedddd                              # 拼音行文字颜色，24位色值，16进制，BGR顺序
      color_space: display_p3                           # Only available on macOS 10.12+
      comment_text_color: 0xdedddd                      # 拼音等提示文字颜色
      font_point: 16                                    # 候选字词大小
      font_face: "PingFangSC"                           # 候选词字体
      hilited_text_color: 0xdedddd                      # 高亮拼音 (需要开启内嵌编码)
      hilited_back_color: 0x252320                      # 高亮拼音 (需要开启内嵌编码)
      hilited_candidate_text_color: 0xffffff            # 第一候选项文字颜色
      hilited_candidate_back_color: 0xcb5d00            # 第一候选项背景背景色
      hilited_candidate_label_color: 0xffffff           # 第一候选项编号颜色
      hilited_corner_radius: 3                          # 高亮圆角
      candidate_text_color: 0xdedddd                    # 预选项文字颜色
      candidate_list_layout: linear                     # 水平排列 linear | stacked
      candidate_format: "%c.\u2005%@\u2005"             # 用 1/6 em 空格 U+2005 来控制编号 %c 和候选词 %@ 前后的空间。
      label_font_point: 14                              # 候选编号大小
      label_font_face: "SFCompactText-Regular"          # 候选词编号字体
      label_color: 0x888785                             # 预选栏编号颜色
      border_color: 0x020202                            # 边框色
      border_height: 4                                  # 窗口边界高度，大于圆角半径才生效
      border_width: 4                                   # 窗口边界宽度，大于圆角半径才生效
      border_color_width: 0                             # 窗口边框颜色宽度

  app_options:
    com.jetbrains.intellij:
      vim_mode: false
    com.jetbrains.datagrip:
      vim_mode: false
    com.jetbrains.WebStorm:
      vim_mode: false
    com.microsoft.VSCode:
      vim_mode: false
      ascii_mode: false
    com.runningwithcrayons.Alfred:
      vim_mode: false
